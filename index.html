<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendetta External</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    background:#000;
    color:white;
    overflow:hidden;
}

/* animated hacker background */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(90deg, transparent 49%, #111 50%, transparent 51%),
    linear-gradient(0deg, transparent 49%, #111 50%, transparent 51%);
    background-size:40px 40px;
    opacity:.25;
    animation:grid 8s linear infinite;
}

@keyframes grid{
    from{transform:translateY(0)}
    to{transform:translateY(40px)}
}

header{
    position:relative;
    display:flex;
    justify-content:space-between;
    padding:30px 70px;
    z-index:2;
}

.logo{
    font-size:30px;
    font-weight:bold;
    letter-spacing:5px;
    color:#fff;
    text-shadow:
    0 0 15px white,
    0 0 35px #777;
}

nav a{
    color:#aaa;
    margin-left:30px;
    text-decoration:none;
    transition:.3s;
}

nav a:hover{
    color:white;
    text-shadow:0 0 15px white;
}


.main{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:2;
}


.v{
    font-size:180px;
    font-weight:900;
    color:#fff;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{
        text-shadow:
        0 0 20px white,
        0 0 60px #444;
    }
    50%{
        text-shadow:
        0 0 50px white,
        0 0 120px #888;
    }
}


h1{
    font-size:45px;
    letter-spacing:8px;
}

p{
    margin:20px;
    color:#888;
}

button{
    margin-top:30px;
    padding:15px 55px;
    border:1px solid white;
    background:transparent;
    color:white;
    cursor:pointer;
    border-radius:30px;
    transition:.3s;
    box-shadow:0 0 20px #222;
}

button:hover{
    background:white;
    color:black;
    box-shadow:
    0 0 30px white;
}


.cards{
    display:flex;
    gap:20px;
    margin-top:40px;
}

.card{
    width:180px;
    padding:20px;
    border:1px solid #222;
    background:#050505;
    text-align:center;
    border-radius:15px;
}

.card:hover{
    border-color:white;
}

.card h3{
    margin-bottom:10px;
}
</style>

</head>

<body>

<header>
<div class="logo">VENDETTA</div>

<nav>
<a href="#">Home</a>
<a href="#">Features</a>
<a href="#">Downloads</a>
</nav>
</header>


<section class="main">

<div class="v">V</div>

<h1>VENDETTA EXTERNAL</h1>

<p>Next generation dark interface</p>

<button>ENTER</button>


<div class="cards">

<div class="card">
<h3>Fast</h3>
<p>Optimized system</p>
</div>

<div class="card">
<h3>Secure</h3>
<p>Private design</p>
</div>

<div class="card">
<h3>Modern</h3>
<p>Neon UI</p>
</div>

</div>

</section>


</body>
</html>
